<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register page</title>
  </head>
  <link rel="stylesheet" href="../style/register.css" />
  <body>
    <div class="container">
      <div class="left-side">
        <h1>Register</h1>
        <form id="registerForm">
          <input
            type="text"
            id="username"
            placeholder="Username"
            name="username"
            required />
          <input
            type="email"
            id="email"
            placeholder="Email"
            name="email"
            required />
          <input
            type="password"
            id="password"
            placeholder="Password"
            name="password"
            required />
          <a href="./login.html">
            <p class="login-link">Already have an account?</p>
          </a>
          <button type="submit" class="btn-submit">Create new account</button>
        </form>
      </div>
      <div class="right-side">
        <img src="../img/login.png" alt="đăng nhập" />
      </div>
    </div>
    <script src="../javascript/register.js"></script>
  </body>
</html>
