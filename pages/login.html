<!-- Login Page -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../style/login.css" />
    <link rel="stylesheet" href="../style/general.css" />
  </head>
  <body>
    <div class="container">
      <div id="logo">
        <h1>Mind<span>X</span> Cinema</h1>
      </div>
      <div class="form">
        <h1>Login</h1>
        <form id="loginForm">
          <input
            name="username"
            id="username"
            placeholder="Username"
            type="text"
            minlength="6"
            maxlength="18"
            required />

          <input
            name="password"
            id="password"
            placeholder="Password"
            type="password"
            required />
          <!--minlength="8"
            maxlength="20" -->
          <button id="submitBtn" type="submit">Login</button>
          <div id="extra">
            <div id="rememberBox">
              <input type="checkbox" id="remember" />
              <label for="remember" id="rememberLabel"> Remember me</label>
            </div>
            <div id="forgotPass">
              <a>Forgot password?</a>
            </div>
          </div>
        </form>
        <h4 id="register-link">
          New to MindX Cinema?<span
            ><a href="./register.html"> Register</a></span
          >
        </h4>
      </div>
    </div>
    <script src="../javascript/login.js"></script>
    <script src="../javascript/general.js"></script>
  </body>
</html>
