<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="./style/register.css" />
    <link rel="stylesheet" href="./style/general.css" />
  </head>
  <body>
    <div class="container">
      <div id="logo">
        <h1>Mind<span>X</span> Cinema</h1>
      </div>
      <div class="form">
        <h1>Register</h1>
        <form id="registerForm">
          <input
            name="username"
            id="username"
            class="inputField"
            placeholder="Username"
            type="text"
            minlength="6"
            maxlength="18"
            required />
          <input
            name="email"
            id="email"
            class="inputField"
            placeholder="Email"
            type="email"
            required />
          <input
            name="password"
            id="password"
            class="inputField"
            placeholder="Password"
            type="password"
            minlength="8"
            maxlength="20"
            required />
          <input
            name="verifyPassword"
            class="inputField"
            id="verifyPassword"
            placeholder="Verify password"
            type="password"
            minlength="8"
            maxlength="20"
            required />
          <div id="termsBox">
            <input type="checkbox" id="terms" name="terms" required />
            <label for="terms" id="termsLabel">
              I accept the terms of the agreement</label
            >
          </div>
          <button id="submitBtn" type="submit">Register</button>
        </form>

        <h4 id="login-link">
          Already have an account?<span
            ><a href="./login.html"> Sign in</a></span
          >
        </h4>
      </div>
    </div>
    <script src="./javascript/register.js"></script>
    <script src="./javascript/general.js"></script>
  </body>
</html>
